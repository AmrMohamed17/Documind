name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO: documind-repo
  IMAGE: documind
  VM_HOST: ${{ secrets.VM_HOST }}
  VM_USER: ${{ secrets.VM_USER }}

jobs:
  # ── Job 1: Run tests ─────────────────────────────────────────────────
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          CHUNK_SIZE: 500
          CHUNK_OVERLAP: 50
          EMBEDDING_MODEL: all-MiniLM-L6-v2
          MLFLOW_TRACKING_URI: sqlite:///mlflow_test.db
          GOOGLE_APPLICATION_CREDENTIALS: ""
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash

  # ── Job 2: Build and push Docker image ───────────────────────────────
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
                       -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest \
                       -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}

  # ── Job 3: Deploy to GCP VM ──────────────────────────────────────────
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    needs: build-and-push  # only runs if build succeeds

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to VM
        env:
          SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ env.VM_USER }}@${{ env.VM_HOST }} "

            # Authenticate Docker on VM to pull from Artifact Registry
            gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

            # Pull latest image
            docker pull ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest

            # Stop and remove old container
            docker stop documind || true
            docker rm documind || true

            # Run new container
            docker run -d \
              --name documind \
              --restart unless-stopped \
              -p 8000:8000 \
              -v /home/ubuntu/data:/app/data \
              -v /home/ubuntu/credentials:/app/credentials \
              -v /home/ubuntu/.chroma:/app/.chroma \
              -v /home/ubuntu/mlflow.db:/app/mlflow.db \
              --env-file /home/ubuntu/.env.docker \
              ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest

            echo 'Deployment complete'
          "

          rm /tmp/deploy_key